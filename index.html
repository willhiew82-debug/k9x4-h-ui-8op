<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0d1726">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <title>Costco - My Account</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    :root {
      color-scheme: dark;
      --bg: #0d1726;
      --panel: rgba(255, 255, 255, 0.94);
      --ink: #111827;
      --muted: #64748b;
      --accent: #005daa;
      --danger: #c1121f;
      --ring: rgba(0, 93, 170, 0.26);
    }

    html, body {
      width: 100%;
      min-height: 100%;
      background: radial-gradient(circle at 50% 0%, #22324f 0, var(--bg) 42%, #070b12 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      overflow: hidden;
    }

    body {
      display: grid;
      place-items: center;
      padding: max(22px, env(safe-area-inset-top)) 18px max(22px, env(safe-area-inset-bottom));
    }

    body.app-active {
      display: block;
      place-items: initial;
      padding: 0;
      background: #e8e8ed;
    }

    body.app-active #app {
      width: 100%;
      min-height: 100vh;
    }

    .login-shell {
      width: min(100%, 420px);
      color: var(--ink);
    }

    .login-card {
      background: var(--panel);
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 8px;
      box-shadow: 0 28px 80px rgba(0, 0, 0, 0.36);
      padding: 28px 22px 22px;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .brand-logo {
      display: block;
      width: 82px;
      height: 82px;
      margin: 0 auto 24px;
      border-radius: 22px;
      object-fit: contain;
      box-shadow: 0 14px 34px rgba(15, 23, 42, 0.18);
    }

    .login-card h1 {
      font-size: clamp(25px, 7vw, 34px);
      line-height: 1.05;
      letter-spacing: 0;
      margin-bottom: 8px;
    }

    .sub {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.45;
      margin-bottom: 24px;
    }

    .login-card label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #334155;
      margin-bottom: 8px;
    }

    .login-card input {
      width: 100%;
      min-height: 52px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 0 14px;
      background: #fff;
      color: var(--ink);
      font-size: 17px;
      outline: none;
      transition: border-color 0.16s ease, box-shadow 0.16s ease;
    }

    .login-card input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--ring);
    }

    .login-card button {
      width: 100%;
      min-height: 52px;
      margin-top: 14px;
      border: 0;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.12s ease, opacity 0.12s ease;
    }

    .login-card button:active { transform: translateY(1px); }
    .login-card button[disabled] { cursor: progress; opacity: 0.7; }

    .error {
      min-height: 20px;
      margin-top: 12px;
      color: var(--danger);
      font-size: 14px;
      font-weight: 700;
    }

    .login-shell.is-hidden { display: none; }
    #app[hidden] { display: none !important; }

    noscript {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 24px;
      background: #0d1726;
      color: #fff;
      text-align: center;
      z-index: 20;
    }

    @media (min-width: 520px) {
      .login-card { padding: 34px 30px 28px; }
    }
  </style>
  <script src="login.js" defer></script>
</head>
<body>
  <noscript>JavaScript is required to unlock this app.</noscript>

  <section class="login-shell" id="loginShell" aria-labelledby="loginTitle">
    <form class="login-card" id="loginForm" autocomplete="off">
      <img class="brand-logo" src="icon.png" alt="Costco">
      <h1 id="loginTitle">Sign in to My Account</h1>
      <p class="sub">Enter your password to continue.</p>

      <label for="passwordInput">Password</label>
      <input id="passwordInput" name="password" type="password" inputmode="text" autocomplete="current-password" autocapitalize="none" spellcheck="false" required>
      <button id="loginButton" type="submit">Sign in</button>
      <p class="error" id="loginError" role="alert" aria-live="polite"></p>
    </form>
  </section>

  <main id="app" hidden aria-hidden="true" style="display:none"></main>
</body>
</html>
